name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "temurin"
          cache: "gradle"

      - name: Build APKs
        run: |
          ./gradlew assembleRelease
          ./gradlew assembleReleaseWithNetwork
          mv app/build/outputs/apk/release/app-release-unsigned.apk FileFlow_${{ github.ref_name }}.apk
          mv app/build/outputs/apk/releaseWithNetwork/app-releaseWithNetwork-unsigned.apk FileFlow_network_${{ github.ref_name }}.apk

      - name: Sign APK
        env:
          KEYSTORE: ${{ secrets.SIGNING_KEY }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          echo "${KEYSTORE}" | base64 -d > apksign.keystore
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks apksign.keystore --ks-pass env:SIGNING_STORE_PASSWORD "FileFlow_${{ github.ref_name }}.apk"
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign --ks apksign.keystore --ks-pass env:SIGNING_STORE_PASSWORD "FileFlow_network_${{ github.ref_name }}.apk"

      - name: Create release
        uses: meeDamian/github-release@v2.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          gzip: folders
          files: >
            FileFlow_${{ github.ref_name }}.apk
            FileFlow_network_${{ github.ref_name }}.apk
